  subtitle: "Custom Multi-Persona Assistant Framework"
  primary_color: "#2563EB"
  logo_icon: "Sparkles"
  footer_text: "© 2026 White Label Demo. Customize for your organization."
  user_avatars:
    - { id: "user-blue", icon: "User", color: "#2563EB", bg: "#EFF6FF" }
    - { id: "briefcase-green", icon: "Briefcase", color: "#059669", bg: "#ECFDF5" }
