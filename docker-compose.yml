services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "8001:8000"
    networks:
      - application
    depends_on:
      - database
    environment:
      MONGODB_CONNECTION_STRING: "mongodb://database:27017"
      MONGODB_DATABASE: undergrad_advisor
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-CHANGEME-by-overriding-in-dot-env-file}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-?}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      GEMINI_MODEL: gemini-2.5-flash
      VLLM_API_KEY: ${VLLM_API_KEY:-}
    volumes:
      - ./multi_llm_chatbot_backend:/ccai/multi_llm_chatbot_backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/ccai/multi_llm_chatbot_backend/app"]
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "3001:3000"
    networks:
      - application
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8001}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./phd-advisor-frontend:/ccai/phd-advisor-frontend
      - /ccai/phd-advisor-frontend/node_modules
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    networks:
      - application
    depends_on:
      - database
    environment:
      MONGODB_CONNECTION_STRING: "mongodb://database:27017"
      MONGODB_DATABASE: undergrad_advisor
      GEMINI_API_KEY: ${GEMINI_API_KEY:-?}
    command: ["python3", "scheduler_main.py"]
  database:
    image: mongo:8.0
    volumes:
      - mongo_data:/data/db
    networks:
      - application
volumes:
  mongo_data:
networks:
  application:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"
